<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel English</title>
  <style>
    :root {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; min-height: 100%; }
    body {
      background: #edf1f7;
      color: #1a202c;
      line-height: 1.7;
    }

    /* Layout */
    .page {
      display: grid;
      grid-template-columns: 290px 1fr;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      background: linear-gradient(180deg, #1b2d4f 0%, #142142 100%);
      padding: 1.5rem 1rem 2rem;
      min-height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: .75rem;
    }
    .sidebar-header h1 {
      margin: 0;
      font-size: 1.1rem;
      color: #ffffff;
      line-height: 1.3;
      letter-spacing: .01em;
    }
    .sidebar-header p {
      margin: .3rem 0 0;
      font-size: .8rem;
      color: #8eadcf;
    }
    .sidebar-header button {
      border: 1px solid rgba(255,255,255,.3);
      background: linear-gradient(135deg, rgba(37,99,235,.15), rgba(59,130,246,.1));
      color: #ffffff;
      border-radius: 8px;
      padding: .45rem .8rem;
      cursor: pointer;
      font-size: .85rem;
      flex-shrink: 0;
      transition: all .3s ease;
    }
    .sidebar-header button:hover { 
      background: linear-gradient(135deg, rgba(37,99,235,.25), rgba(59,130,246,.2));
      border-color: rgba(255,255,255,.5);
      transform: translateY(-2px);
    }
    .sidebar p.description {
      margin: 0;
      color: #7a9bbf;
      font-size: .82rem;
      line-height: 1.5;
    }
    .sidebar-search input {
      width: 100%;
      border: 2px solid rgba(255,255,255,.2);
      border-radius: 10px;
      padding: .7rem 1rem;
      font-size: .875rem;
      background: rgba(255,255,255,.08);
      color: #ffffff;
      outline: none;
      transition: all .3s ease;
    }
    .sidebar-search input::placeholder { color: #6a8fad; }
    .sidebar-search input:focus {
      border-color: rgba(37,99,235,.6);
      background: rgba(255,255,255,.15);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }

    /* TOC accordion */
    .toc {
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }
    .toc-unit { border-radius: 10px; }
    .toc a.level-2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .7rem 1rem;
      border-radius: 10px;
      text-decoration: none;
      color: #b8d0ee;
      background: rgba(255,255,255,.06);
      font-size: .875rem;
      font-weight: 500;
      transition: background .2s, color .2s;
      cursor: pointer;
      user-select: none;
    }
    .toc a.level-2 .toc-arrow {
      font-size: 1rem;
      opacity: .55;
      transition: transform .25s ease;
      flex-shrink: 0;
      margin-left: .5rem;
    }
    .toc-unit.expanded > a.level-2 .toc-arrow { transform: rotate(90deg); }
    .toc a.level-2:hover { 
      background: rgba(255,255,255,.15);
      color: #ffffff;
      transform: translateX(4px);
    }
    .toc a.level-2.active { 
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(37,99,235,.3);
    }
    .toc a.level-2.active .toc-arrow { opacity: .8; }

    /* Sub-list with smooth expand */
    .toc-sublist {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows .28s ease;
    }
    .toc-unit.expanded .toc-sublist { grid-template-rows: 1fr; }
    .toc-sublist-inner {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: .15rem;
      padding: .25rem 0 .25rem .5rem;
    }
    .toc a.level-3 {
      display: block;
      padding: .5rem .85rem;
      border-radius: 7px;
      text-decoration: none;
      color: #6b93bc;
      font-size: .82rem;
      border-left: 3px solid rgba(255,255,255,.1);
      transition: all .2s ease;
    }
    .toc a.level-3:hover {
      background: rgba(255,255,255,.1);
      color: #93c5fd;
      border-left-color: rgba(59,130,246,.6);
      transform: translateX(3px);
    }
    .toc a.level-3.active {
      background: rgba(37,99,235,.2);
      color: #60a5fa;
      border-left-color: #2563eb;
      font-weight: 600;
    }
    /* Topbar */
    .topbar {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.75rem .85rem;
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border-bottom: 2px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 4px 12px rgba(27,45,79,.08);
    }
    .topbar .title-group {
      display: flex;
      flex-direction: column;
      gap: .2rem;
    }
    .topbar h2 {
      margin: 0;
      font-size: 1rem;
      color: #1b2d4f;
      font-weight: 600;
    }
    .topbar p { margin: 0; color: #64748b; font-size: .85rem; }
    .topbar select {
      min-width: 220px;
      border-radius: 10px;
      border: 2px solid #cbd5e1;
      background: linear-gradient(to right, #f8fafc, #ffffff);
      padding: .65rem 1rem;
      font-size: .875rem;
      color: #1a202c;
      cursor: pointer;
      transition: all .2s ease;
    }
    .topbar select:hover {
      border-color: #2563eb;
      box-shadow: 0 2px 8px rgba(37,99,235,.1);
    }
    .topbar select:focus { 
      outline: none; 
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .topbar .info { color: #64748b; font-size: .875rem; }

    /* Content area */
    .content-area {
      padding: 1.5rem 2rem 3rem;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }
    #content {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(27,45,79,.12), 0 1px 4px rgba(27,45,79,.05);
      padding: 2rem 2.5rem;
    }
    #content h1, #content h2, #content h3, #content h4 {
      scroll-margin-top: 80px;
    }
    #content h1 {
      font-size: 1.85rem;
      margin-top: 0;
      color: #1b2d4f;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: .75rem;
    }
    #content h2 {
      font-size: 1.4rem;
      margin-top: 2.5rem;
      color: #1b2d4f;
      border-left: 5px solid;
      border-image: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%) 1;
      padding-left: .85rem;
    }
    #content h3 {
      font-size: 1.15rem;
      margin-top: 1.75rem;
      color: #1d4ed8;
      font-weight: 600;
    }
    #content p { margin: .9rem 0; }
    #content blockquote {
      margin: 1.25rem 0;
      padding: 1rem 1.25rem;
      border-left: 5px solid #2563eb;
      background: linear-gradient(135deg, #eff6ff 0%, #e0f2fe 100%);
      color: #0c4a6e;
      border-radius: 0 10px 10px 0;
      box-shadow: 0 2px 8px rgba(37,99,235,.1);
    }
    #content pre, #content code {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
    }
    #content pre {
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      padding: 1.1rem 1.25rem;
      border-radius: 12px;
      overflow: auto;
      margin: 1.1rem 0;
      border: 1px solid #cbd5e1;
      box-shadow: inset 0 2px 4px rgba(0,0,0,.05);
    }
    #content code {
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      padding: .15rem .45rem;
      border-radius: 5px;
      font-size: .9em;
      color: #1d4ed8;
      font-weight: 500;
    }
    #content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.25rem 0;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 12px rgba(27,45,79,.1);
    }
    #content th,
    #content td {
      border: 1px solid #e2e8f0;
      padding: .8rem 1.1rem;
      text-align: left;
    }
    #content th {
      background: linear-gradient(135deg, #1b2d4f 0%, #142142 100%);
      color: #ffffff;
      font-weight: 600;
      font-size: .875rem;
      letter-spacing: .02em;
    }
    #content tr:nth-child(even) td { 
      background: linear-gradient(90deg, #f8fafc 0%, #f1f5f9 100%);
    }
    #content ul, #content ol {
      margin: .9rem 0 .9rem 1.5rem;
      padding: 0;
    }
    #content li { margin: .35rem 0; }
    #content hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 2rem 0;
    }
    .footer-note {
      margin-top: 1.25rem;
      color: #64748b;
      font-size: .85rem;
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .page { grid-template-columns: 260px 1fr; }
      .content-area { padding: 1.25rem 1.25rem 2rem; }
    }
    @media (max-width: 860px) {
      .page { grid-template-columns: 1fr; }
      .sidebar { position: relative; min-height: auto; width: 100%; }
      .topbar { padding-left: 1rem; padding-right: 1rem; }
      .content-area { padding: 0 1rem 2rem; }
    }
    @media (max-width: 760px) {
      .sidebar { display: none; }
      .sidebar.open { display: block; }
      .page { min-height: auto; }
      .sidebar-header { flex-wrap: wrap; }
      .sidebar-header button { width: 100%; }
      #content { padding: 1.25rem 1.25rem; }
      /* iOS Safari tự zoom khi font-size < 16px — buộc 16px để tắt zoom */
      .topbar select,
      .sidebar-search input { font-size: 1rem; }
    }

    /* Track play buttons */
    .track-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 0.3rem 0.85rem 0.3rem 0.7rem;
      font-size: 0.8rem;
      font-family: inherit;
      font-style: normal;
      font-weight: 600;
      cursor: pointer;
      vertical-align: middle;
      transition: all .2s ease;
      line-height: 1.5;
      min-height: 32px;
      touch-action: manipulation;
      user-select: none;
      box-shadow: 0 2px 8px rgba(37,99,235,.2);
    }
    .track-btn:hover { 
      background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(37,99,235,.3);
    }
    .track-btn:active { transform: scale(0.96); }
    .track-btn.playing { 
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
      box-shadow: 0 2px 8px rgba(220,38,38,.3);
    }
    .track-icon { font-size: 0.7rem; line-height: 1; }

    /* Floating audio bar */
    .audio-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(135deg, #1b2d4f 0%, #142142 100%);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.55rem 1rem;
      z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,0,0,.4);
      transform: translateY(100%);
      transition: transform .3s ease;
    }
    .audio-bar.visible { transform: translateY(0); }
    .audio-bar-title {
      font-size: 0.8rem;
      color: #93c5fd;
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: 500;
    }
    #mainAudio {
      flex: 1;
      min-width: 0;
      height: 36px;
      accent-color: #3b82f6;
    }
    .audio-close-btn {
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s ease;
      touch-action: manipulation;
    }
    .audio-close-btn:hover { 
      background: rgba(255,255,255,.3);
      transform: scale(1.1) rotate(90deg);
    }
    body.audio-active { padding-bottom: 58px; }
    @media (max-width: 480px) {
      .audio-bar { gap: 0.5rem; padding: 0.5rem 0.75rem; }
      .audio-bar-title { display: none; }
      /* Force 16px font-size on interactive elements to prevent iOS Safari auto-zoom */
      input, button, select, textarea, .track-btn {
        font-size: 16px !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div>
          <h1>Hotel English</h1>
          <p id="currentUnitDesc">Unit 1</p>
        </div>
        <button id="toggleSidebar" type="button">Menu</button>
      </div>
      <p class="description">Dùng bảng điều hướng bên dưới để mở nhanh mỗi bài học. Bạn có thể tìm kiếm tên bài ngay trong menu.</p>
      <div class="sidebar-search">
        <input id="searchToc" type="search" placeholder="Tìm bài học..." aria-label="Tìm bài học" />
      </div>
      <nav class="toc" id="toc"></nav>
    </aside>

    <section class="content-area">
      <div class="topbar">
        <div class="title-group">
          <h2 id="topbarTitle">Hotel English</h2>
          <p>Chọn unit bên dưới để tải nội dung bài học.</p>
        </div>
        <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">
          <select id="unitSelect" aria-label="Chọn unit" style="min-width:200px;">
            <option value="1">Unit 1 – Phone Inquiries</option>
            <option value="2">Unit 2 – Drivers, Doormen &amp; Bellhops</option>
            <option value="3">Unit 3 – Reception</option>
            <option value="4">Unit 4 – Amenities</option>
            <option value="5">Unit 5 – Requests for Services</option>
            <option value="6">Unit 6 – Directions</option>
            <option value="7">Unit 7 – Tour Planning</option>
            <option value="8">Unit 8 – Handling Complaints</option>
            <option value="9">Unit 9 – Restaurant / Bar</option>
            <option value="10">Unit 10 – Business Center / Events</option>
            <option value="11">Unit 11 – Small Talk</option>
            <option value="12">Unit 12 – Paying the Bill</option>
            <option value="13">Unit 13 – Emergencies</option>
            <option value="14">Unit 14 – Job Interviewing</option>
          </select>
          <select id="partSelect" aria-label="Chọn part" style="min-width:180px;">
            <option value="">— Chọn part —</option>
          </select>
        </div>
      </div>
      <article id="content"></article>
      <p class="footer-note" id="loadingMsg">Đang tải nội dung...</p>
    </section>
  </div>

  <!-- Floating audio player -->
  <div class="audio-bar" id="audioBar">
    <span class="audio-bar-title" id="audioBarTitle">♪ Track —</span>
    <audio id="mainAudio" controls></audio>
    <button class="audio-close-btn" id="audioClose" aria-label="Đóng">✕</button>
  </div>

  <script>

    const headingIds = {};

    function toId(text) {
      const base = text.trim().toLowerCase().replace(/[^a-z0-9\u0080-\uFFFF]+/g, '-').replace(/^-+|-+$/g, '');
      let id = base || 'section';
      let counter = 1;
      while (headingIds[id]) {
        id = `${base}-${counter++}`;
      }
      headingIds[id] = true;
      return id;
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderInline(text) {
      let output = escapeHtml(text);
      output = output.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      output = output.replace(/__(.+?)__/g, '<strong>$1</strong>');
      output = output.replace(/\*(.+?)\*/g, '<em>$1</em>');
      output = output.replace(/_(.+?)_/g, '<em>$1</em>');
      output = output.replace(/`([^`]+?)`/g, '<code>$1</code>');
      output = output.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      return output;
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n/g, '\n').split('\n');
      let html = '';
      let openList = null;
      let openTable = false;
      let tableRows = [];
      let paragraph = null;

      const closeList = () => {
        if (openList) {
          html += `</${openList}>\n`;
          openList = null;
        }
      };

      const closeTable = () => {
        if (openTable) {
          html += '<table>' + tableRows.join('') + '</table>\n';
          openTable = false;
          tableRows = [];
        }
      };

      const flushParagraph = () => {
        if (paragraph !== null) {
          html += `<p>${renderInline(paragraph.trim())}</p>\n`;
          paragraph = null;
        }
      };

      const isTableSeparator = (line) => {
        const columns = line.split('|').slice(1, -1).map(cell => cell.trim());
        return columns.length > 0 && columns.every(cell => /^:?-{3,}:?$/.test(cell));
      };

      for (let rawLine of lines) {
        const line = rawLine.replace(/\t/g, '    ');
        if (/^\s*$/.test(line)) {
          closeList();
          closeTable();
          flushParagraph();
          continue;
        }

        if (/^---+$/.test(line.trim())) {
          closeList();
          closeTable();
          flushParagraph();
          html += '<hr />\n';
          continue;
        }

        const headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
        if (headingMatch) {
          closeList();
          closeTable();
          flushParagraph();
          const level = headingMatch[1].length;
          const text = headingMatch[2].trim();
          const id = toId(text);
          html += `<h${level} id="${id}">${renderInline(text)}</h${level}>\n`;
          continue;
        }

        const blockquoteMatch = line.match(/^>\s?(.*)$/);
        if (blockquoteMatch) {
          closeList();
          closeTable();
          flushParagraph();
          html += `<blockquote>${renderInline(blockquoteMatch[1])}</blockquote>\n`;
          continue;
        }

        const orderedMatch = line.match(/^\s*\d+\.\s+(.*)$/);
        const unorderedMatch = line.match(/^\s*([-*+])\s+(.*)$/);
        if (orderedMatch || unorderedMatch) {
          closeTable();
          flushParagraph();
          const listType = orderedMatch ? 'ol' : 'ul';
          if (openList !== listType) {
            closeList();
            openList = listType;
            html += `<${listType}>\n`;
          }
          const itemText = orderedMatch ? orderedMatch[1] : unorderedMatch[2];
          html += `<li>${renderInline(itemText)}</li>\n`;
          continue;
        }

        if (/\|/.test(line) && !isTableSeparator(line)) {
          const trimmed = line.trim();
          const hasTable = trimmed.startsWith('|') && trimmed.endsWith('|');
          if (hasTable) {
            closeList();
            flushParagraph();
            openTable = true;
            const cells = trimmed.split('|').slice(1, -1).map(cell => cell.trim());
            const row = cells.map(cell => `<td>${renderInline(cell)}</td>`).join('');
            tableRows.push(`<tr>${row}</tr>\n`);
            continue;
          }
        }

        closeList();
        closeTable();
        paragraph = paragraph ? `${paragraph} ${line.trim()}` : line.trim();
      }

      flushParagraph();
      closeList();
      closeTable();
      return html;
    }

    function buildNavigation() {
      const contentElement = document.getElementById('content');
      const toc = document.getElementById('toc');
      toc.innerHTML = '';

      const units = Array.from(contentElement.querySelectorAll('h2'));

      units.forEach((unit) => {
        const anchor = unit.id;
        const subs = [];
        let el = unit.nextElementSibling;
        while (el && el.tagName !== 'H2') {
          if (el.tagName === 'H3' || el.tagName === 'H4') {
            subs.push({ id: el.id, text: el.textContent });
          }
          el = el.nextElementSibling;
        }

        const unitDiv = document.createElement('div');
        unitDiv.className = 'toc-unit';

        const link = document.createElement('a');
        link.href = `#${anchor}`;
        link.dataset.anchor = anchor;
        link.className = 'level-2';
        link.textContent = unit.textContent;

        const arrow = document.createElement('span');
        arrow.className = 'toc-arrow';
        arrow.textContent = subs.length ? '›' : '';
        link.appendChild(arrow);

        link.addEventListener('click', (event) => {
          event.preventDefault();
          document.getElementById(anchor).scrollIntoView({ behavior: 'smooth', block: 'start' });
          document.querySelectorAll('.toc a.active').forEach((item) => item.classList.remove('active'));
          link.classList.add('active');
          if (subs.length) unitDiv.classList.toggle('expanded');
          if (window.innerWidth <= 760) {
            document.getElementById('sidebar').classList.remove('open');
          }
        });

        unitDiv.appendChild(link);

        const sublist = document.createElement('div');
        sublist.className = 'toc-sublist';
        const inner = document.createElement('div');
        inner.className = 'toc-sublist-inner';
        subs.forEach((s) => {
          const a = document.createElement('a');
          a.href = `#${s.id}`;
          a.className = 'level-3';
          a.textContent = s.text;
          a.addEventListener('click', (ev) => {
            ev.preventDefault();
            document.getElementById(s.id).scrollIntoView({ behavior: 'smooth', block: 'start' });
            document.querySelectorAll('.toc a.active').forEach((item) => item.classList.remove('active'));
            a.classList.add('active');
            if (window.innerWidth <= 760) document.getElementById('sidebar').classList.remove('open');
          });
          inner.appendChild(a);
        });
        sublist.appendChild(inner);
        unitDiv.appendChild(sublist);

        toc.appendChild(unitDiv);
      });

      const firstLink = document.querySelector('.toc a.level-2');
      if (firstLink) {
        firstLink.classList.add('active');
        firstLink.closest('.toc-unit').classList.add('expanded');
      }
    }

    function initTocSearch() {
      const searchInput = document.getElementById('searchToc');
      searchInput.addEventListener('input', () => {
        const filter = searchInput.value.trim().toLowerCase();
        document.querySelectorAll('#toc a').forEach((item) => {
          const visible = item.textContent.toLowerCase().includes(filter);
          item.style.display = visible ? 'block' : 'none';
        });
      });
    }

    function initSidebarToggle() {
      const sidebar = document.getElementById('sidebar');
      const button = document.getElementById('toggleSidebar');
      button.addEventListener('click', () => {
        sidebar.classList.toggle('open');
      });
    }

    function buildPartSelect(contentEl) {
      const partSelect = document.getElementById('partSelect');
      partSelect.innerHTML = '<option value="">— Chọn part —</option>';
      contentEl.querySelectorAll('h3').forEach(h3 => {
        const opt = document.createElement('option');
        opt.value = h3.id;
        opt.textContent = h3.textContent;
        partSelect.appendChild(opt);
      });
    }

    async function loadUnit(unitNum) {
      const loadingMsg = document.getElementById('loadingMsg');
      const contentEl = document.getElementById('content');
      if (loadingMsg) loadingMsg.textContent = 'Đang tải...';
      contentEl.innerHTML = '';
      try {
        const res = await fetch('md/Unit' + unitNum + '.md');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const md = await res.text();
        contentEl.innerHTML = injectTrackButtons(renderMarkdown(md));
        buildNavigation();
        buildPartSelect(contentEl);
        // Update labels
        const firstH1 = contentEl.querySelector('h1');
        const unitLabel = firstH1 ? firstH1.textContent : 'Unit ' + unitNum;
        document.getElementById('topbarTitle').textContent = unitLabel;
        document.getElementById('currentUnitDesc').textContent = unitLabel;
        if (loadingMsg) loadingMsg.textContent = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        contentEl.innerHTML = '<p style="color:red;padding:2rem;">Không tải được Unit ' + unitNum + ': ' + err.message + '</p>';
        if (loadingMsg) loadingMsg.textContent = '';
      }
    }

    function injectTrackButtons(html) {
      return html.replace(/\(Track (\d+)\)/g, (_, num) => {
        const padded = String(num).padStart(2, '0');
        const src = `mp3/Track ${padded}.mp3`;
        return `<button class="track-btn" data-src="${src}" data-track="${num}"><span class="track-icon">▶</span> Track ${num}</button>`;
      });
    }

    function initAudioBar() {
      const bar = document.getElementById('audioBar');
      const audio = document.getElementById('mainAudio');
      const barTitle = document.getElementById('audioBarTitle');
      const closeBtn = document.getElementById('audioClose');

      function setButtonState(track, playing) {
        document.querySelectorAll(`.track-btn[data-track="${track}"]`).forEach(btn => {
          btn.classList.toggle('playing', playing);
          const icon = btn.querySelector('.track-icon');
          if (icon) icon.textContent = playing ? '⏸' : '▶';
        });
      }

      function clearAllButtons() {
        document.querySelectorAll('.track-btn').forEach(btn => {
          btn.classList.remove('playing');
          const icon = btn.querySelector('.track-icon');
          if (icon) icon.textContent = '▶';
        });
      }

      document.addEventListener('click', e => {
        const btn = e.target.closest('.track-btn');
        if (!btn) return;
        const src = btn.dataset.src;
        const track = btn.dataset.track;
        const isSame = audio.dataset.currentTrack === track;

        if (isSame && !audio.paused) {
          audio.pause();
        } else {
          clearAllButtons();
          audio.src = encodeURI(src);
          audio.dataset.currentTrack = track;
          barTitle.textContent = `♪ Track ${track}`;
          bar.classList.add('visible');
          document.body.classList.add('audio-active');
          audio.play().catch(() => {});
        }
      });

      audio.addEventListener('play', () => setButtonState(audio.dataset.currentTrack, true));
      audio.addEventListener('pause', () => setButtonState(audio.dataset.currentTrack, false));
      audio.addEventListener('ended', () => setButtonState(audio.dataset.currentTrack, false));

      closeBtn.addEventListener('click', () => {
        audio.pause();
        audio.removeAttribute('src');
        audio.load();
        delete audio.dataset.currentTrack;
        bar.classList.remove('visible');
        document.body.classList.remove('audio-active');
        clearAllButtons();
      });
    }

    function init() {
      initTocSearch();
      initSidebarToggle();
      initAudioBar();
      const unitSelect = document.getElementById('unitSelect');
      unitSelect.addEventListener('change', () => {
        loadUnit(unitSelect.value);
      });
      const partSelect = document.getElementById('partSelect');
      partSelect.addEventListener('change', () => {
        const id = partSelect.value;
        if (!id) return;
        const target = document.getElementById(id);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        partSelect.value = '';
      });
      loadUnit(1);
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
